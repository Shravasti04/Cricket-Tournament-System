<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Team - Cricket Tournament</title>
    <meta name="description" content="Register a new team in the tournament">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="logo">🏏 CricketManager</a>
        <ul class="navbar-links">
            <li><a href="/index.html">Dashboard</a></li>
            <li><a href="/add_tournament.html">Add Tournament</a></li>
            <li><a href="/add_team.html" class="active">Add Team</a></li>
            <li><a href="/add_player.html">Add Player</a></li>
            <li><a href="/schedule_match.html">Schedule Match</a></li>
            <li><a href="/enter_score.html">Enter Score</a></li>
            <li><a href="/points_table.html">Points Table</a></li>
            <li><a href="/view_data.html">View Data</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Add New Team</h2>
            <div id="alertMessage" class="alert"></div>
            
            <form id="addTeamForm">
                <div class="form-group">
                    <label for="tournament_id">Select Tournament</label>
                    <select id="tournament_id" name="tournament_id" class="form-control" required>
                        <option value="">Select Tournament</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="team_name">Team Name</label>
                    <input type="text" id="team_name" name="team_name" class="form-control" required placeholder="e.g. Mumbai Indians">
                </div>
                <div class="form-group">
                    <label for="coach">Coach Name</label>
                    <input type="text" id="coach" name="coach" class="form-control" required placeholder="e.g. Mahela Jayawardene">
                </div>
                <button type="submit" class="btn">Register Team</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
