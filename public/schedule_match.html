<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Match - Cricket Tournament</title>
    <meta name="description" content="Schedule a new match in the tournament">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="logo">🏏 CricketManager</a>
        <ul class="navbar-links">
            <li><a href="/index.html">Dashboard</a></li>
            <li><a href="/add_tournament.html">Add Tournament</a></li>
            <li><a href="/add_team.html">Add Team</a></li>
            <li><a href="/add_player.html">Add Player</a></li>
            <li><a href="/schedule_match.html" class="active">Schedule Match</a></li>
            <li><a href="/enter_score.html">Enter Score</a></li>
            <li><a href="/points_table.html">Points Table</a></li>
            <li><a href="/view_data.html">View Data</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Schedule New Match</h2>
            <div id="alertMessage" class="alert"></div>
            
            <form id="scheduleMatchForm">
                <div class="form-group">
                    <label for="tournament_id">Tournament</label>
                    <select id="tournament_id" name="tournament_id" class="form-control" required>
                        <option value="">Select Tournament</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="team1_id">Team 1</label>
                    <select id="team1_id" name="team1_id" class="form-control" required>
                        <option value="">Select Team 1</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="team2_id">Team 2</label>
                    <select id="team2_id" name="team2_id" class="form-control" required>
                        <option value="">Select Team 2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Match Date</label>
                    <input type="date" id="date" name="date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="venue">Venue</label>
                    <input type="text" id="venue" name="venue" class="form-control" required placeholder="e.g. Wankhede Stadium, Mumbai">
                </div>
                <button type="submit" class="btn">Schedule Match</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
