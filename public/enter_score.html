<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Score - Cricket Tournament</title>
    <meta name="description" content="Enter score for a match">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="logo">🏏 CricketManager</a>
        <ul class="navbar-links">
            <li><a href="/index.html">Dashboard</a></li>
            <li><a href="/add_tournament.html">Add Tournament</a></li>
            <li><a href="/add_team.html">Add Team</a></li>
            <li><a href="/add_player.html">Add Player</a></li>
            <li><a href="/schedule_match.html">Schedule Match</a></li>
            <li><a href="/enter_score.html" class="active">Enter Score</a></li>
            <li><a href="/points_table.html">Points Table</a></li>
            <li><a href="/view_data.html">View Data</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Enter Match Score</h2>
            <div id="alertMessage" class="alert"></div>
            
            <form id="enterScoreForm">
                <div class="form-group">
                    <label for="tournament_id_filter">Select Tournament (Filter Matches)</label>
                    <select id="tournament_id_filter" class="form-control">
                        <option value="">All Tournaments</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="match_id">Select Match</label>
                    <select id="match_id" name="match_id" class="form-control" required>
                        <option value="">Select Match</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="team_id">Select Team (Innings)</label>
                    <select id="team_id" name="team_id" class="form-control" required>
                        <option value="">Select Team</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="runs">Runs Scored</label>
                    <input type="number" id="runs" name="runs" class="form-control" required min="0">
                </div>
                <div class="form-group">
                    <label for="wickets">Wickets Lost</label>
                    <input type="number" id="wickets" name="wickets" class="form-control" required min="0" max="10">
                </div>
                <div class="form-group">
                    <label for="overs">Overs Played</label>
                    <input type="number" id="overs" name="overs" class="form-control" required min="0" step="0.1">
                </div>
                <button type="submit" class="btn">Record Score</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
