<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Tournament - Cricket Tournament</title>
    <meta name="description" content="Register a new tournament">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="logo">🏏 CricketManager</a>
        <ul class="navbar-links">
            <li><a href="/index.html">Dashboard</a></li>
            <li><a href="/add_tournament.html" class="active">Add Tournament</a></li>
            <li><a href="/add_team.html">Add Team</a></li>
            <li><a href="/add_player.html">Add Player</a></li>
            <li><a href="/schedule_match.html">Schedule Match</a></li>
            <li><a href="/enter_score.html">Enter Score</a></li>
            <li><a href="/points_table.html">Points Table</a></li>
            <li><a href="/view_data.html">View Data</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Add New Tournament</h2>
            <div id="alertMessage" class="alert"></div>
            
            <form id="addTournamentForm">
                <div class="form-group">
                    <label for="tournament_name">Tournament Name</label>
                    <input type="text" id="tournament_name" name="tournament_name" class="form-control" required placeholder="e.g. IPL 2026">
                </div>
                <div class="form-group">
                    <label for="start_date">Start Date</label>
                    <input type="date" id="start_date" name="start_date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="end_date">End Date</label>
                    <input type="date" id="end_date" name="end_date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="organizer">Organizer</label>
                    <input type="text" id="organizer" name="organizer" class="form-control" required placeholder="e.g. BCCI">
                </div>
                <button type="submit" class="btn">Register Tournament</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
