<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Player - Cricket Tournament</title>
    <meta name="description" content="Register a new player in the tournament">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="logo">🏏 CricketManager</a>
        <ul class="navbar-links">
            <li><a href="/index.html">Dashboard</a></li>
            <li><a href="/add_tournament.html">Add Tournament</a></li>
            <li><a href="/add_team.html">Add Team</a></li>
            <li><a href="/add_player.html" class="active">Add Player</a></li>
            <li><a href="/schedule_match.html">Schedule Match</a></li>
            <li><a href="/enter_score.html">Enter Score</a></li>
            <li><a href="/points_table.html">Points Table</a></li>
            <li><a href="/view_data.html">View Data</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Add New Player</h2>
            <div id="alertMessage" class="alert"></div>
            
            <form id="addPlayerForm">
                <div class="form-group">
                    <label for="player_name">Player Name</label>
                    <input type="text" id="player_name" name="player_name" class="form-control" required placeholder="e.g. Rohit Sharma">
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" class="form-control" required min="10" max="60">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" class="form-control" required>
                        <option value="">Select Role</option>
                        <option value="Batsman">Batsman</option>
                        <option value="Bowler">Bowler</option>
                        <option value="All-rounder">All-rounder</option>
                        <option value="Wicketkeeper">Wicketkeeper</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="team_id">Team</label>
                    <select id="team_id" name="team_id" class="form-control" required>
                        <option value="">Select Team</option>
                    </select>
                </div>
                <button type="submit" class="btn">Register Player</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
